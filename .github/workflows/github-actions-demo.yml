name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing GitHub Actions for TP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  explore-github-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger information
        run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      - name: Runner information
        run: echo "This job is running on a ${{ runner.os }} server hosted by GitHub."
      - name: Branch and repository
        run: echo "Branch is ${{ github.ref }} and repository is ${{ github.repository }}."

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: List files in repository
        run: ls -la ${{ github.workspace }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r appli/requirements.txt

      - name: Validate Flask app syntax
        run: python -m py_compile appli/app.py

      - name: Job status
        run: echo "This job status is ${{ job.status }}."